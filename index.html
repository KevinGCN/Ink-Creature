<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mis 15 Años</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="invitacion.png" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #c8a2ff, #5a2a82);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Contenedor principal */
        .invitation-container {
            opacity: 0;
            transform: scale(0.8) translateY(40px);
            animation: entradaMagica 2s ease-out forwards;
        }

        /* Imagen */
        .invitation-container img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(200, 160, 255, 0.7);
            animation: brillo 3s ease-in-out infinite alternate;
        }

        .texto-invitacion {
            margin-top: 25px;
            padding: 30px 40px;
            text-align: center;
            backdrop-filter: blur(12px);
            animation: aparecerTexto 2.5s ease forwards;
            color: #f8eaff;
            font-family: 'Playfair Display', 'Times New Roman', serif;
        }

        /* Título elegante */
        .texto-invitacion h1 {
            font-family: 'Great Vibes', 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 12px;
            letter-spacing: 3px;
            font-weight: 400;
            text-shadow: 0 0 14px rgba(255, 220, 255, 0.95);
        }

        /* Texto principal refinado */
        .texto-invitacion p {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            margin-bottom: 22px;
            line-height: 1.7;
            letter-spacing: 0.5px;
            color: #f3dfff;
        }

        /* Detalles */
        .detalles {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 1rem;
            color: #fbeaff;
        }

        /* Animación */
        @keyframes aparecerTexto {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Animación de entrada */
        @keyframes entradaMagica {
            0% {
                opacity: 0;
                transform: scale(0.7) translateY(60px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Brillo suave */
        @keyframes brillo {
            from {
                box-shadow: 0 0 25px rgba(200, 160, 255, 0.6);
            }

            to {
                box-shadow: 0 0 55px rgba(230, 200, 255, 0.95);
            }
        }

        /* Partículas flotantes */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: flotar 8s linear infinite;
        }

        @keyframes flotar {
            from {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            to {
                transform: translateY(-10vh) scale(1);
                opacity: 1;
            }
        }

        .boton-whatsapp {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.7);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .boton-whatsapp:hover {
            transform: scale(1.07);
            box-shadow: 0 0 30px rgba(37, 211, 102, 1);
        }
    </style>
</head>

<body>

    <!-- Imagen de la invitación -->
    <div class="invitation-container">
        <img src="invitacion.png" alt="Invitación Mis 15 Años">
    </div>


    <!-- Imagen de la invitación -->
    <div class="texto-invitacion">
        <h1>Mis 15 Años</h1>
        <p>
            Con mucha alegría<br>
            te invito a celebrar este momento tan especial en mi vida
        </p>

        <div class="detalles">
            <span>📅 15 de Agosto de 2026</span>
            <span>🕖 7:00 PM</span>
            <span>📍 Salón de Eventos Estrella</span>
            <span><a href="https://wa.me/573108389827?text=Hola,%20Soy%20'Nombre'%20y%20confirmo%20mi%20asistencia%20a%20los%2015's%20🎉"
                    target="_blank" class="boton-whatsapp">
                    💬 Confirmar asistencia
                </a>
            </span>
        </div>
    </div>


    <!-- Efecto partículas -->
    <script>
        for (let i = 0; i < 30; i++) {
            const sparkle = document.createElement("div");
            sparkle.className = "sparkle";
            sparkle.style.left = Math.random() * 100 + "vw";
            sparkle.style.animationDuration = (5 + Math.random() * 5) + "s";
            sparkle.style.opacity = Math.random();
            sparkle.style.width = sparkle.style.height = (4 + Math.random() * 6) + "px";
            document.body.appendChild(sparkle);
        }
    </script>

</body>


</html>
